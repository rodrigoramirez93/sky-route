services:
  api:
    build:
      context: ./src/api/SkyRoute
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

  web:
    build:
      context: ./src/web/sky-route
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
