<div class="container">
  <h1>Sky Route – Bookings</h1>

  @if (loading()) {
    <p class="status">Loading bookings…</p>
  } @else if (error()) {
    <p class="status error">{{ error() }}</p>
  } @else {
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Temp (°C)</th>
          <th>Temp (°F)</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody>
        @for (b of bookings(); track b.date) {
          <tr>
            <td>{{ b.date }}</td>
            <td>{{ b.temperatureC }}</td>
            <td>{{ b.temperatureF }}</td>
            <td>{{ b.summary }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>

<router-outlet />
